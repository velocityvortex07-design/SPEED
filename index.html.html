<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STRIKE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020408;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
  }
  canvas {
    border-radius: 10px;
    cursor: crosshair;
    max-width: 100%;
  }
  #info {
    color: #4b5563;
    font-size: 12px;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="gc" width="650" height="450"></canvas>
<div id="info">WASD / Arrow Keys to move &nbsp;|&nbsp; Auto-fire ON &nbsp;|&nbsp; Collect S=Shield &nbsp;R=Rapid &nbsp;M=Multi-shot</div>

<script>
const C = document.getElementById('gc');
const ctx = C.getContext('2d');
const W = 650, H = 450;

let state = 'menu', score = 0, hi = 0, lives = 3, wave = 1;
let combo = 0, comboT = 0, frame = 0, shakeMag = 0, shakeX = 0, shakeY = 0;
let bullets = [], eBullets = [], enemies = [], parts = [], pups = [];
let rapidF = 0, spreadS = 0, shield = 0, shootCd = 0;
const keys = {};
let mouseY = H / 2;

// --- AUDIO ---
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
function initAC() { if (!ac) ac = new AC(); }
function beep(t) {
  if (!ac) return;
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    if (t === 'shoot') {
      o.frequency.setValueAtTime(660, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(220, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.08, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    } else if (t === 'boom') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.3);
      g.gain.setValueAtTime(0.15, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    } else if (t === 'hit') {
      o.type = 'square';
      o.frequency.setValueAtTime(80, ac.currentTime);
      g.gain.setValueAtTime(0.25, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    } else if (t === 'up') {
      o.frequency.setValueAtTime(330, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(660, ac.currentTime + 0.15);
      g.gain.setValueAtTime(0.15, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    }
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.35);
  } catch (e) {}
}

// --- STARS ---
const stars = Array.from({ length: 90 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: Math.random() * 1.8 + 0.3,
  s: Math.random() * 1.2 + 0.3,
  b: Math.random()
}));

// --- PLAYER ---
const P = { x: 90, y: H / 2, w: 36, h: 22, sp: 4, inv: 0 };

// --- INPUT ---
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'Enter') && state !== 'playing') {
    initAC(); startGame();
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouseY = (e.clientY - r.top) * (H / r.height);
});
C.addEventListener('click', () => { initAC(); if (state !== 'playing') startGame(); });

// --- GAME INIT ---
function startGame() {
  state = 'playing'; score = 0; lives = 3; wave = 1;
  combo = 0; comboT = 0; frame = 0; shakeMag = 0;
  P.x = 90; P.y = H / 2; P.inv = 0; shootCd = 0;
  bullets = []; eBullets = []; enemies = []; parts = []; pups = [];
  rapidF = 0; spreadS = 0; shield = 0;
  spawnWave();
}

function spawnWave() {
  const n = Math.min(4 + wave * 2, 20);
  for (let i = 0; i < n; i++) {
    const t = wave < 3 ? 0 : wave < 5 ? (Math.random() < 0.4 ? 1 : 0) : Math.floor(Math.random() * 3);
    enemies.push(mkEnemy(t));
  }
}

function mkEnemy(t) {
  const x = W + 60 + Math.random() * 150, y = 30 + Math.random() * 390;
  if (t === 0) return { x, y, w: 28, h: 18, hp: 1, mhp: 1, sp: 1.8 + wave * 0.25, t, st: 0, pts: 10, col: '#f87171', phase: Math.random() * Math.PI * 2 };
  if (t === 1) return { x, y, w: 38, h: 26, hp: 4, mhp: 4, sp: 1.0 + wave * 0.15, t, st: 80, pts: 40, col: '#fb923c', phase: 0 };
  return { x, y, w: 22, h: 14, hp: 1, mhp: 1, sp: 3.5 + wave * 0.35, t, st: 0, pts: 25, col: '#c084fc', phase: Math.random() * Math.PI * 2 };
}

function spawnParts(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = Math.random() * 4 + 1;
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, dec: 0.025 + Math.random() * 0.025, r: Math.random() * 3.5 + 1, col });
  }
}

function doShoot() {
  if (shootCd > 0) return;
  shootCd = rapidF > 0 ? 4 : 13;
  beep('shoot');
  const bx = P.x + P.w / 2, by = P.y;
  bullets.push({ x: bx, y: by, vx: 11, vy: 0 });
  if (spreadS > 0) {
    bullets.push({ x: bx, y: by, vx: 10, vy: -2.8 });
    bullets.push({ x: bx, y: by, vx: 10, vy: 2.8 });
  }
}

// --- DRAW HELPERS ---
function drawPlayerShip(x, y, inv) {
  if (inv > 0 && (inv % 6 < 3)) return;
  ctx.fillStyle = '#93c5fd';
  ctx.beginPath();
  ctx.moveTo(x + 18, y);
  ctx.lineTo(x - 18, y - 11);
  ctx.lineTo(x - 8, y);
  ctx.lineTo(x - 18, y + 11);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.ellipse(x - 16, y, 5, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(251,191,36,0.3)';
  ctx.beginPath();
  ctx.ellipse(x - 22, y, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  if (shield > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.15);
    ctx.strokeStyle = `rgba(96,165,250,${0.4 + 0.4 * pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawEnemy(e) {
  ctx.fillStyle = e.col;
  if (e.t === 0) {
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.w, e.y - e.h / 2);
    ctx.lineTo(e.x + e.w - 10, e.y);
    ctx.lineTo(e.x + e.w, e.y + e.h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (e.t === 1) {
    ctx.fillRect(e.x, e.y - e.h / 2, e.w, e.h);
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(e.x + e.w - 6, e.y - 3, 10, 6);
    if (e.mhp > 1) {
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(e.x, e.y - e.h / 2 - 7, e.w, 4);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(e.x, e.y - e.h / 2 - 7, e.w * (e.hp / e.mhp), 4);
    }
  } else {
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.w, e.y - e.h / 2);
    ctx.lineTo(e.x + e.w, e.y + e.h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(192,132,252,0.3)';
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y, e.w / 2 + 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPup(p) {
  const pulse = 0.7 + 0.3 * Math.sin(frame * 0.12);
  ctx.globalAlpha = pulse;
  const cols = { shield: '#60a5fa', rapid: '#fbbf24', spread: '#a78bfa' };
  const lbl = { shield: 'S', rapid: 'R', spread: 'M' };
  ctx.fillStyle = cols[p.type];
  ctx.beginPath();
  ctx.roundRect(p.x - 14, p.y - 14, 28, 28, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(lbl[p.type], p.x, p.y);
  ctx.globalAlpha = 1;
}

// --- UPDATE ---
function update() {
  if (state !== 'playing') return;
  frame++;
  if (shootCd > 0) shootCd--;
  if (rapidF > 0) rapidF--;
  if (spreadS > 0) spreadS--;
  if (shield > 0) shield--;
  if (P.inv > 0) P.inv--;
  if (comboT > 0) comboT--; else combo = 0;
  shakeMag *= 0.82;
  shakeX = (Math.random() - 0.5) * shakeMag;
  shakeY = (Math.random() - 0.5) * shakeMag;

  // Player movement
  if (keys['ArrowUp']  || keys['KeyW']) P.y -= P.sp;
  if (keys['ArrowDown']|| keys['KeyS']) P.y += P.sp;
  if (keys['ArrowLeft']|| keys['KeyA']) P.x -= P.sp;
  if (keys['ArrowRight']||keys['KeyD']) P.x += P.sp;
  P.y += (mouseY - P.y) * 0.1;
  P.x = Math.max(18, Math.min(300, P.x));
  P.y = Math.max(P.h / 2 + 5, Math.min(H - P.h / 2 - 5, P.y));

  doShoot();

  // Move bullets
  bullets  = bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.x < W + 10 && b.y > 0 && b.y < H; });
  eBullets = eBullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.x > -10 && b.y > 0 && b.y < H; });

  // Update enemies
  const dead = [];
  enemies.forEach(e => {
    e.x -= e.sp;
    if (e.t === 2) e.y += Math.sin(frame * 0.06 + e.phase) * 2.5;
    if (e.t === 0) e.y += Math.sin(frame * 0.04 + e.phase) * 1.2;
    if (e.t === 1) {
      e.st--;
      if (e.st <= 0) {
        e.st = Math.max(35, 80 - wave * 4);
        const dx = P.x - e.x, dy = P.y - e.y, d = Math.sqrt(dx*dx + dy*dy);
        eBullets.push({ x: e.x, y: e.y, vx: (dx/d) * 3.5, vy: (dy/d) * 3.5 });
      }
    }
    // Bullet collisions
    let killed = false;
    bullets = bullets.filter(b => {
      if (killed) return true;
      const hit = b.x > e.x && b.x < e.x + e.w && b.y > e.y - e.h/2 && b.y < e.y + e.h/2;
      if (hit) { e.hp--; spawnParts(b.x, b.y, e.col, 5); if (e.hp <= 0) { killed = true; dead.push(e); } }
      return !hit;
    });
  });

  dead.forEach(e => {
    score += e.pts * (1 + combo * 0.5);
    combo++; comboT = 100;
    spawnParts(e.x + e.w/2, e.y, e.col, 18);
    beep('boom'); shakeMag = 6;
    if (Math.random() < 0.22) {
      const types = ['shield','rapid','spread'];
      pups.push({ x: e.x, y: e.y, type: types[Math.floor(Math.random() * 3)], vx: -1.2 });
    }
  });

  enemies = enemies.filter(e => e.hp > 0 && e.x > -60);
  if (enemies.length === 0) { wave++; spawnWave(); }

  // Player hit detection
  if (P.inv === 0) {
    eBullets = eBullets.filter(b => {
      const hit = Math.abs(b.x - P.x) < 18 && Math.abs(b.y - P.y) < 11;
      if (hit) {
        if (shield > 0) { shield = 0; spawnParts(P.x, P.y, '#60a5fa', 12); return false; }
        lives--; P.inv = 90; shakeMag = 12; combo = 0; beep('hit');
        if (lives <= 0) { state = 'dead'; if (score > hi) hi = score; }
        return false;
      }
      return true;
    });

    enemies.forEach(e => {
      if (P.inv > 0) return;
      const hit = P.x + 18 > e.x && P.x - 18 < e.x + e.w && Math.abs(P.y - e.y) < 11 + e.h/2;
      if (hit) {
        if (shield > 0) { shield = 0; e.hp = 0; spawnParts(e.x, e.y, e.col, 20); beep('boom'); }
        else { lives--; P.inv = 90; shakeMag = 12; e.hp = 0; combo = 0; beep('hit'); if (lives <= 0) { state = 'dead'; if (score > hi) hi = score; } }
      }
    });
  }

  // Powerup collection
  pups = pups.filter(p => {
    p.x += p.vx;
    const got = Math.abs(p.x - P.x) < 26 && Math.abs(p.y - P.y) < 26;
    if (got) {
      beep('up');
      if (p.type === 'shield') shield = 360;
      if (p.type === 'rapid')  rapidF  = 360;
      if (p.type === 'spread') spreadS = 360;
    }
    return !got && p.x > -20;
  });

  // Particles
  parts = parts.filter(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.life -= p.dec; return p.life > 0; });

  // Stars scroll
  stars.forEach(s => { s.x -= s.s; if (s.x < 0) { s.x = W; s.y = Math.random() * H; } });
}

// --- HUD ---
function drawHUD() {
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#e2e8f0';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('SCORE: ' + Math.floor(score), 12, 12);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fbbf24';
  ctx.fillText('WAVE ' + wave, W / 2, 12);

  ctx.textAlign = 'right';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < lives ? '#f87171' : '#374151';
    ctx.font = '22px sans-serif';
    ctx.fillText('♥', W - 12 - i * 26, 10);
  }

  if (combo > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = `hsl(${frame * 4 % 360},100%,65%)`;
    ctx.font = `bold ${Math.min(26, 12 + combo * 2)}px monospace`;
    ctx.fillText('x' + combo + ' COMBO!', W / 2, 42);
  }

  let px = 12;
  ctx.textBaseline = 'alphabetic';
  if (rapidF  > 0) { ctx.fillStyle = '#fbbf24'; ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.fillText('RAPID:'  + Math.ceil(rapidF  / 60) + 's', px, H - 8); px += 80; }
  if (spreadS > 0) { ctx.fillStyle = '#a78bfa'; ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.fillText('MULTI:'  + Math.ceil(spreadS / 60) + 's', px, H - 8); px += 80; }
  if (shield  > 0) { ctx.fillStyle = '#60a5fa'; ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.fillText('SHIELD:' + Math.ceil(shield  / 60) + 's', px, H - 8); }

  ctx.textAlign = 'right';
  ctx.fillStyle = '#4b5563';
  ctx.font = '13px monospace';
  ctx.fillText('BEST: ' + Math.floor(hi), W - 10, H - 8);
}

// --- SCREENS ---
function drawMenu() {
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#1d4ed8';
  ctx.fillText('NOVA', W / 2 + 3, 158);
  ctx.fillStyle = '#93c5fd';
  ctx.fillText('NOVA', W / 2, 155);

  ctx.fillStyle = '#991b1b';
  ctx.fillText('STRIKE', W / 2 + 3, 218);
  ctx.fillStyle = '#f87171';
  ctx.fillText('STRIKE', W / 2, 215);

  ctx.fillStyle = '#6b7280';
  ctx.font = '14px monospace';
  ctx.fillText('WASD / Arrow Keys to move  •  Auto-fire is ON', W / 2, 285);
  ctx.fillText('Collect power-ups to survive longer', W / 2, 308);

  // Sample ship
  ctx.save();
  ctx.translate(W / 2, H / 2 + 8);
  ctx.fillStyle = '#93c5fd';
  ctx.beginPath(); ctx.moveTo(22, 0); ctx.lineTo(-20, -12); ctx.lineTo(-8, 0); ctx.lineTo(-20, 12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.ellipse(-18, 0, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  const p = 0.6 + 0.4 * Math.sin(frame * 0.08);
  ctx.globalAlpha = p;
  ctx.fillStyle = '#f1f5f9';
  ctx.font = 'bold 19px monospace';
  ctx.fillText('► CLICK or PRESS ENTER ◄', W / 2, 390);
  ctx.globalAlpha = 1;
}

function drawOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#7f1d1d';
  ctx.font = 'bold 44px monospace';
  ctx.fillText('GAME OVER', W / 2 + 3, 163);
  ctx.fillStyle = '#fca5a5';
  ctx.fillText('GAME OVER', W / 2, 160);

  ctx.fillStyle = '#e2e8f0';
  ctx.font = '26px monospace';
  ctx.fillText('SCORE: ' + Math.floor(score), W / 2, 220);

  if (score >= hi && score > 0) {
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('★ NEW HIGH SCORE! ★', W / 2, 258);
  } else {
    ctx.fillStyle = '#6b7280';
    ctx.font = '16px monospace';
    ctx.fillText('BEST: ' + Math.floor(hi), W / 2, 258);
  }

  ctx.fillStyle = '#818cf8';
  ctx.font = '16px monospace';
  ctx.fillText('You survived ' + wave + ' waves', W / 2, 292);

  const p = 0.6 + 0.4 * Math.sin(frame * 0.09);
  ctx.globalAlpha = p;
  ctx.fillStyle = '#f1f5f9';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('► CLICK or ENTER to RETRY ◄', W / 2, 365);
  ctx.globalAlpha = 1;
}

// --- DRAW ---
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.fillStyle = '#070b14';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  stars.forEach(s => {
    ctx.globalAlpha = 0.25 + 0.75 * s.b;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state === 'menu') {
    drawMenu();
  } else {
    parts.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); });
    ctx.globalAlpha = 1;

    pups.forEach(drawPup);

    eBullets.forEach(b => {
      ctx.fillStyle = '#f87171';
      ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(248,113,113,0.25)';
      ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
    });

    bullets.forEach(b => {
      ctx.fillStyle = '#34d399';
      ctx.beginPath(); ctx.ellipse(b.x, b.y, 7, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(52,211,153,0.2)';
      ctx.beginPath(); ctx.ellipse(b.x, b.y, 10, 5, 0, 0, Math.PI * 2); ctx.fill();
    });

    enemies.forEach(drawEnemy);
    drawPlayerShip(P.x, P.y, P.inv);
    drawHUD();

    if (state === 'dead') drawOver();
  }

  ctx.restore();
}

// --- LOOP ---
function loop() { update(); draw(); requestAnimationFrame(loop); }

// --- RESPONSIVE ---
function resize() {
  const maxW = Math.min(W, window.innerWidth - 24);
  C.style.width  = maxW + 'px';
  C.style.height = Math.round(maxW * H / W) + 'px';
}
resize();
window.addEventListener('resize', resize);

loop();
</script>
</body>
</html>
